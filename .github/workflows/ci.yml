name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  # Spiegelt den lokalen Mac-Innenloop: gesamte Core-Logik + Whisper-Integration.
  core-macos:
    runs-on: macos-15
    env:
      SPITR_TEST_MODEL_DIR: ${{ github.workspace }}/.model-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: .model-cache
          key: ggml-base-v1
      - name: Test Spitr.Core
        run: dotnet test tests/Spitr.Core.Tests -c Release

  windows:
    runs-on: windows-latest
    env:
      SPITR_TEST_MODEL_DIR: ${{ github.workspace }}/.model-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: .model-cache
          key: ggml-base-v1
      - name: Build solution
        run: dotnet build Spitr.slnx -c Release
      - name: Test Spitr.Core (Windows)
        run: dotnet test tests/Spitr.Core.Tests -c Release --no-build
      - name: Test Spitr.App adapters
        run: dotnet test tests/Spitr.App.Tests -c Release --no-build
      - name: Publish self-contained exe
        run: >
          dotnet publish src/Spitr.App -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o artifacts/publish
      - name: Selftest E2E (echte Pipeline gegen das publizierte Exe)
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "artifacts/publish/Spitr.exe" `
            -ArgumentList '--selftest','tests/Spitr.Core.Tests/Fixtures/german_test.wav' `
            -PassThru -Wait -NoNewWindow
          Write-Host "selftest exit code: $($p.ExitCode)"
          exit $p.ExitCode
      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spitr-win-x64
          path: artifacts/publish/

  # Privacy-Wächter: HttpClient & Co. sind ausschließlich in ModelDownloader erlaubt.
  no-network-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for network code outside ModelDownloader
        run: |
          hits=$(grep -rn --include='*.cs' -E 'HttpClient|WebRequest|WebClient|HttpWebRequest' src/ | grep -v 'ModelDownloader' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Netzwerk-Code außerhalb von ModelDownloader gefunden"
            exit 1
          fi
